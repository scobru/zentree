<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#090a0c"/>
    </linearGradient>
    <linearGradient id="top" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4f5"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="bot" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#2ec4b6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Top crown layer -->
  <polygon points="16,3 23,14 9,14" fill="url(#top)" opacity="0.9"/>

  <!-- Bottom crown layer (wider, overlaps) -->
  <polygon points="16,9 27,24 5,24" fill="url(#bot)"/>

  <!-- Trunk -->
  <rect x="13.5" y="24" width="5" height="5" rx="1.5" fill="#2ec4b6" opacity="0.75"/>
</svg>
