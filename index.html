<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenTree — Decentralized Links</title>
  <meta name="description" content="Decentralized personal Linktree landing page powered by ZEN and static HTML.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Shared Tokens */
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      
      --zen: #00b4d8;
      --apps: #2ec4b6;
      --music: #e01e37;
      --connect: #ffb703;
    }

    /* Light Theme (matching reference screenshot) */
    [data-theme="light"] {
      --bg-outer: #f5f6f8;
      --bg-card: #ffffff;
      --text-primary: #121212;
      --text-secondary: #5e6670;
      --text-muted: #8c96a3;
      --card-bg: #ffffff;
      --card-bg-hover: #f8f9fa;
      --card-border: rgba(0, 0, 0, 0.08);
      --card-border-hover: rgba(0, 0, 0, 0.16);
      --container-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.02);
      --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.06);
      --badge-bg: #f1f3f5;
      --badge-bg-hover: #e9ecef;
      --avatar-ring: linear-gradient(135deg, #00b4d8, #e01e37);
    }

    /* Dark Theme */
    [data-theme="dark"] {
      --bg-outer: #090a0c;
      --bg-card: #121316;
      --text-primary: #f5f5f7;
      --text-secondary: #9ba0a5;
      --text-muted: #4a4f54;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-bg-hover: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.06);
      --card-border-hover: rgba(255, 255, 255, 0.12);
      --container-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.2);
      --badge-bg: rgba(255, 255, 255, 0.05);
      --badge-bg-hover: rgba(255, 255, 255, 0.1);
      --avatar-ring: linear-gradient(135deg, #2ec4b6, #ffb703);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-outer);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem 4rem;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── Linktree Canvas ── */
    .lt-card {
      background: var(--bg-card);
      width: 100%;
      max-width: 580px;
      border-radius: 32px;
      box-shadow: var(--container-shadow);
      padding: 2rem 1.5rem;
      position: relative;
      border: 1px solid var(--card-border);
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    /* ── Top Floating Action Bar ── */
    .lt-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .lt-action-btn {
      background: var(--badge-bg);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 18px;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s ease, color 0.2s ease;
    }

    .lt-action-btn:hover {
      transform: scale(1.08);
      background: var(--badge-bg-hover);
    }

    .lt-action-btn:active {
      transform: scale(0.95);
    }

    /* ── Header ── */
    .lt-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .lt-avatar-container {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
      padding: 3px;
      background: var(--avatar-ring);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      position: relative;
    }

    .lt-avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg-card);
      border: 2px solid var(--bg-card);
    }

    .lt-avatar-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--badge-bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -1px;
    }

    .lt-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .lt-bio {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
      max-width: 380px;
      margin: 0 auto;
      font-weight: 400;
    }

    /* ── Social Row ── */
    .lt-social-row {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      margin: 1rem auto 2rem;
      flex-wrap: wrap;
      max-width: 400px;
    }

    .lt-social-row a {
      color: var(--text-secondary);
      font-size: 22px;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .lt-social-row a:hover {
      transform: scale(1.2) translateY(-2px);
      color: var(--text-primary);
    }

    /* ── Section Title ── */
    .lt-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: capitalize;
      margin: 2.25rem 0 1rem;
      text-align: center;
      letter-spacing: 0.05em;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .lt-section-title::before,
    .lt-section-title::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--card-border);
      max-width: 60px;
    }

    .lt-section {
      margin-bottom: 0.5rem;
    }

    /* ── Link Card ── */
    .lt-link {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 12px 16px;
      margin-bottom: 12px;
      text-decoration: none;
      color: var(--text-primary);
      box-shadow: var(--card-shadow);
      transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  background-color 0.2s ease,
                  border-color 0.2s ease,
                  box-shadow 0.2s ease;
    }

    .lt-link:hover {
      transform: translateY(-2px);
      background: var(--card-bg-hover);
      border-color: var(--card-border-hover);
      box-shadow: var(--card-shadow-hover);
    }

    .lt-link:active {
      transform: translateY(0);
    }

    .lt-link-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .lt-link:hover .lt-link-icon {
      transform: scale(1.08);
    }

    .lt-link-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .lt-link-title {
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lt-link-subtitle {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lt-link-action {
      color: var(--text-muted);
      font-size: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      transition: background-color 0.2s, color 0.2s;
    }

    .lt-link:hover .lt-link-action {
      color: var(--text-primary);
      background: var(--badge-bg);
    }

    /* ── Icon tints ── */
    .ic-zen {
      background: rgba(0, 180, 216, 0.08);
      color: var(--zen);
    }

    .ic-apps {
      background: rgba(46, 196, 182, 0.08);
      color: var(--apps);
    }

    .ic-music {
      background: rgba(224, 30, 55, 0.08);
      color: var(--music);
    }

    .ic-connect {
      background: rgba(255, 183, 3, 0.08);
      color: var(--connect);
    }

    /* ── Toast Notification ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(18, 19, 22, 0.9);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(8px);
      z-index: 1000;
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    [data-theme="light"] .toast {
      background: rgba(255, 255, 255, 0.95);
      color: #121212;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* ── Footer ── */
    .lt-footer {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2.5rem;
      border-top: 1px dashed var(--card-border);
      padding-top: 1.5rem;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      body {
        padding: 0;
        background: var(--bg-card);
      }
      .lt-card {
        border-radius: 0;
        box-shadow: none;
        border: none;
        padding: 1.5rem 1rem;
        min-height: 100vh;
      }
    }

    .hidden {
      display: none !important;
    }

    /* Auth & Admin Panel Styles */
    .admin-section {
      margin-top: 1.5rem;
      border-top: 1px dashed var(--card-border);
      padding-top: 1.5rem;
    }

    .admin-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    .lt-card-body {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }

    .lt-card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .lt-form-row {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-bottom: 12px;
    }

    .lt-form-row:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 640px) {
      .lt-form-row {
        flex-direction: column;
      }
    }

    .lt-input {
      background-color: var(--badge-bg);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      width: 100%;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .lt-input:focus {
      outline: none;
      border-color: var(--apps);
      box-shadow: 0 0 0 3px rgba(46, 196, 182, 0.15);
    }

    .lt-btn {
      background: var(--apps);
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
    }

    .lt-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .lt-btn:active {
      transform: translateY(0);
    }

    .lt-link-action.trash-btn {
      border: none;
      background: none;
      cursor: pointer;
    }

    .lt-link-action.trash-btn:hover {
      color: #e01e37 !important;
      background: rgba(224, 30, 55, 0.15) !important;
    }
  </style>
</head>

<body>

  <main class="lt-card">
    
    <!-- Top Action Bar -->
    <div class="lt-top-bar">
      <button class="lt-action-btn" id="theme-toggle" aria-label="Toggle Theme" title="Toggle Light/Dark Theme">
        <i class="ti ti-asterisk"></i>
      </button>
      <button class="lt-action-btn" id="share-btn" aria-label="Share Profile" title="Copy profile link">
        <i class="ti ti-share"></i>
      </button>
    </div>

    <!-- Profile Header -->
    <header class="lt-header">
      <div class="lt-avatar-container">
        <img class="lt-avatar" src="" alt="avatar" style="display:none;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="lt-avatar-fallback">ZT</div>
      </div>
      <h1 class="lt-name">ZenTree</h1>
      <p class="lt-bio">Your Name — Developer &amp; Creator.<br>P2P, open-source, decentralized personal portal.</p>
    </header>

    <!-- Centered Social Row (Linktree Style) -->
    <div class="lt-social-row">
      <a href="https://github.com/" target="_blank" rel="noopener" aria-label="GitHub"><i class="ti ti-brand-github"></i></a>
      <a href="https://x.com/" target="_blank" rel="noopener" aria-label="Twitter"><i class="ti ti-brand-x"></i></a>
      <a href="https://t.me/" target="_blank" rel="noopener" aria-label="Telegram"><i class="ti ti-brand-telegram"></i></a>
      <a href="mailto:your-email@domain.com" aria-label="Email"><i class="ti ti-mail"></i></a>
    </div>

    <!-- MUSIC & ART SECTION -->
    <section class="lt-section" aria-labelledby="sec-music">
      <h2 class="lt-section-title" id="sec-music">music &amp; art</h2>
      <div id="links-music"></div>
    </section>

    <!-- WEB APPS SECTION -->
    <section class="lt-section" aria-labelledby="sec-apps">
      <h2 class="lt-section-title" id="sec-apps">web apps &amp; projects</h2>
      <div id="links-apps"></div>
    </section>

    <!-- ZEN APPS SECTION -->
    <section class="lt-section" aria-labelledby="sec-zen">
      <h2 class="lt-section-title" id="sec-zen">apps</h2>
      <div id="links-zen"></div>
    </section>

    <!-- CONNECT SECTION -->
    <section class="lt-section" aria-labelledby="sec-connect">
      <h2 class="lt-section-title" id="sec-connect">connect</h2>
      <div id="links-connect"></div>
    </section>

    <!-- Admin Settings Section -->
    <section class="admin-section">
      <div class="admin-title" id="admin-toggle">
        <i class="ti ti-settings"></i> Manage Portal <i class="ti ti-chevron-down" id="admin-chevron" style="transition: transform 0.2s; font-size: 11px; margin-left: 4px; transform: rotate(-90deg);"></i>

        <!-- Auth Form -->
        <div id="auth-form">
          <p class="lt-card-desc"><i class="ti ti-key" style="color:var(--apps);"></i> Authenticate with Master Credentials to modify links.</p>

            <input type="text" id="user-input" placeholder="Username" class="lt-input">
            <input type="password" id="pass-input" placeholder="Password" class="lt-input">
            <button class="lt-btn" id="login-btn">Authenticate</button>

        </div>
        
        <!-- Management Panel -->

          <p class="lt-card-desc"><i class="ti ti-pencil" style="color:var(--apps);"></i> Add new link to portal.</p>

            <input type="text" id="link-title" placeholder="Title (e.g. Sudo Records)" class="lt-input">
            <input type="text" id="link-subtitle" placeholder="Subtitle (e.g. Record Label)" class="lt-input">

          <div class="lt-form-row">

            <select id="link-cat" class="lt-input" style="height: 46px;">

              <option value="apps">Web Apps & Projects</option>

            <input type="text" id="link-icon" placeholder="Icon (e.g. ti ti-headphones)" class="lt-input">
            <select id="link-icon-color" class="lt-input" style="height: 46px;">
              <option value="music">Music (Red)</option>
              <option value="apps">Apps (Green)</option>

              <option value="connect">Connect (Orange)</option>

          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 8px; flex-wrap: wrap;">
            <button class="lt-btn" id="logout-btn" style="background: var(--text-muted);">Logout</button>
            <button class="lt-btn" id="seed-btn" style="background: #ffb703; color: #121212;">Seed Defaults</button>
            <button class="lt-btn" id="add-link-btn">Add Link</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="lt-footer">
      // 13 items indexed &nbsp;·&nbsp; system: <span style="color:var(--apps); font-weight: 500;">online</span>
    </footer>

  </main>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const shareBtn = document.getElementById('share-btn');

    // Load stored theme or default to light
    const savedTheme = localStorage.getItem('theme');
    const initialTheme = savedTheme || 'light';

    document.documentElement.setAttribute('data-theme', initialTheme);

    // Toggle Theme Interaction
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      
      // Rotate effect on click
      themeToggle.style.transform = 'scale(0.8) rotate(180deg)';
      setTimeout(() => {
        themeToggle.style.transform = '';
      }, 250);
    });

    // Toast notification function
    function showToast(message) {
      let toast = document.querySelector('.toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      toast.innerHTML = `<i class="ti ti-circle-check" style="color: var(--apps); font-size: 16px;"></i> ${message}`;
      
      // Force a reflow
      toast.offsetHeight;
      
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Copy to Clipboard Share action
    shareBtn.addEventListener('click', () => {
      const profileUrl = window.location.href;
      navigator.clipboard.writeText(profileUrl).then(() => {
        showToast('Profile link copied to clipboard!');
      }).catch(() => {
        // Fallback for older browsers or secure context issues
        const el = document.createElement('textarea');
        el.value = profileUrl;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast('Profile link copied to clipboard!');
      });
    });
  </script>

  <script type="module">
    import ZEN from 'https://unpkg.com/@akaoio/zen/zen.min.js';

    const PUBLIC_VIEW_KEY = '';

    let zen;
    let pair;
    let isAuthenticated = false;

    const relays = ["wss://delay.scobrudot.dev/zen", "wss://zen.akao.io:8420/zen", "wss://zen0.akao.io:8420/zen", "wss://zen1.akao.io:8420/zen"];
    localStorage.removeItem('zenPeers');

    zen = new ZEN({
      peers: relays,
    });

    // Auto-load public links or show dynamic placeholder
    if (PUBLIC_VIEW_KEY) {
      loadLinks(PUBLIC_VIEW_KEY);
    } else {
      document.getElementById('links-apps').innerHTML = `
        <div class="lt-link" style="border: 1px dashed var(--apps); background: none; cursor: default;">
          <div class="lt-link-icon ic-apps"><i class="ti ti-info-circle"></i></div>
          <div class="lt-link-content">
            <span class="lt-link-title">Zentree is Ready!</span>
            <span class="lt-link-subtitle">Scroll down and open "Manage Portal" to authenticate and seed links!</span>
          </div>
        </div>
      `;
    }

    // Dynamic Link Renderer
    function loadLinks(pubKey) {
      if (!pubKey) return;
      
      // Clear containers for a new user/key loading
      document.getElementById('links-music').innerHTML = '';
      document.getElementById('links-apps').innerHTML = '';
      document.getElementById('links-zen').innerHTML = '';
      document.getElementById('links-connect').innerHTML = '';

      zen.get('~' + pubKey).get('portal_links').map().on((link, id) => {
        const linkElId = 'lnk-' + id;
        
        // Handle deletion
        if (!link) {
          const el = document.getElementById(linkElId);
          if (el) el.remove();
          updateCount();
          return;
        }

        if (!link.title || !link.url) return;

        const cat = link.cat || 'apps';
        const container = document.getElementById('links-' + cat);
        if (!container) return;

        let el = document.getElementById(linkElId);
        if (!el) {
          el = document.createElement('a');
          el.id = linkElId;
          el.className = 'lt-link';
          el.target = '_blank';
          el.rel = 'noopener';
          container.appendChild(el);
        }

        el.href = link.url;
        
        const iconClass = link.icon || 'ti ti-link';
        const iconColor = link.iconColor || 'apps';
        
        // Render action block depending on Auth
        let actionMarkup = `<div class="lt-link-action"><i class="ti ti-dots-vertical"></i></div>`;
        if (isAuthenticated) {
          actionMarkup = `
            <button class="lt-link-action trash-btn" title="Delete Link">
              <i class="ti ti-trash" style="color: #e01e37;"></i>
            </button>
          `;
        }

        el.innerHTML = `
          <div class="lt-link-icon ic-${iconColor}"><i class="${iconClass}"></i></div>
          <div class="lt-link-content">
            <span class="lt-link-title">${link.title}</span>
            <span class="lt-link-subtitle">${link.subtitle || ''}</span>
          </div>
          ${actionMarkup}
        `;

        // If authenticated, setup trash button listener
        if (isAuthenticated) {
          const trash = el.querySelector('.trash-btn');
          if (trash) {
            trash.onclick = (e) => {
              e.preventDefault();
              e.stopPropagation();
              deleteLink(id);
            };
          }
        }

        // Apply dynamic sorting by timestamp
        el.setAttribute('data-timestamp', link.timestamp || Date.now());
        const children = Array.from(container.children);
        children.sort((a, b) => parseInt(a.getAttribute('data-timestamp')) - parseInt(b.getAttribute('data-timestamp')));
        children.forEach(child => container.appendChild(child));

        updateCount();
      });
    }

    function updateCount() {
      const footer = document.querySelector('.lt-footer');
      if (footer) {
        const total = document.querySelectorAll('.lt-link').length;
        footer.innerHTML = `// ${total} items indexed &nbsp;·&nbsp; system: <span style="color:var(--apps); font-weight: 500;">online</span>`;
      }
    }

    // Authenticate Flow
    async function login() {
      const userInput = document.getElementById('user-input').value || sessionStorage.getItem('zen_user');
      const passInput = document.getElementById('pass-input').value || sessionStorage.getItem('zen_pass');
      if (!userInput || !passInput) return;

      try {
        const btn = document.getElementById('login-btn');
        btn.innerHTML = 'Authenticating...';

        pair = await ZEN.pair(null, { seed: userInput + passInput });
        isAuthenticated = true;

        sessionStorage.setItem('zen_user', userInput);
        sessionStorage.setItem('zen_pass', passInput);

        document.getElementById('auth-form').classList.add('hidden');
        document.getElementById('mgmt-panel').classList.remove('hidden');

        // Toggle admin panel title styling to show logged in state
        const title = document.getElementById('admin-toggle');
        title.innerHTML = `<i class="ti ti-settings" style="color:var(--apps);"></i> Manage Portal (Authenticated) <i class="ti ti-chevron-down" id="admin-chevron" style="transition: transform 0.2s; font-size: 11px; margin-left: 4px;"></i>`;

        // Reload links using active writer key
        loadLinks(pair.pub);
      } catch (e) {
        console.error("Auth Error:", e);
        alert("Auth failed: " + e.message);
        document.getElementById('login-btn').innerText = "Authenticate";
      }
    }

    // Add Link Function
    function addLink() {
      if (!isAuthenticated) return;
      const title = document.getElementById('link-title').value;
      const subtitle = document.getElementById('link-subtitle').value;
      const url = document.getElementById('link-url').value;
      const cat = document.getElementById('link-cat').value;
      const icon = document.getElementById('link-icon').value || 'ti ti-link';
      const iconColor = document.getElementById('link-icon-color').value;

      if (!title || !url) {
        alert("Title and URL are required!");
        return;
      }

      const link = {
        title,
        subtitle,
        url,
        cat,
        icon,
        iconColor,
        timestamp: Date.now()
      };

      const soul = 'lnk-' + Date.now() + '-' + Math.random().toString(36).substring(7);

      zen.get('~' + pair.pub).get('portal_links').get(soul).put(link, (ack) => {
        if (ack && ack.err) {
          alert("Save failed: " + ack.err);
        } else {
          showToast("Link added successfully!");
          document.getElementById('link-title').value = '';
          document.getElementById('link-subtitle').value = '';
          document.getElementById('link-url').value = '';
          document.getElementById('link-icon').value = '';
        }
      }, { authenticator: pair });
    }

    // Delete Link Function
    function deleteLink(soul) {
      if (!isAuthenticated) return;
      if (!confirm("Are you sure you want to delete this link?")) return;

      zen.get('~' + pair.pub).get('portal_links').get(soul).put(null, (ack) => {
        if (ack && ack.err) {
          alert("Delete failed: " + ack.err);
        } else {
          showToast("Link deleted successfully!");
        }
      }, { authenticator: pair });
    }

    // Logout Function
    function logout() {
      sessionStorage.removeItem('zen_user');
      sessionStorage.removeItem('zen_pass');
      window.location.reload();
    }

    // Migration / Seeding Script
    function seedDefaults() {
      if (!isAuthenticated) return;
      if (!confirm("Seed default links to your portal database? This will publish initial links.")) return;

      const initialLinks = [
        { title: "My Portfolio", subtitle: "Personal portfolio website", url: "https://example.com", cat: "music", icon: "ti ti-world", iconColor: "music", timestamp: 1600000000001 },
        { title: "My GitHub", subtitle: "Checkout my open source code", url: "https://github.com", cat: "apps", icon: "ti ti-brand-github", iconColor: "apps", timestamp: 1600000000002 },
        { title: "Keep App", subtitle: "My zero-knowledge vault", url: "apps/keep.html", cat: "zen", icon: "ti ti-lock", iconColor: "zen", timestamp: 1600000000003 },
        { title: "Notes App", subtitle: "My offline-first notepad", url: "apps/notes.html", cat: "zen", icon: "ti ti-notes", iconColor: "zen", timestamp: 1600000000004 },
        { title: "Bookmarks App", subtitle: "My decentralized bookmarks", url: "apps/bookmarks.html", cat: "zen", icon: "ti ti-bookmark", iconColor: "zen", timestamp: 1600000000005 },
        { title: "My Twitter / X", subtitle: "Follow me on social media", url: "https://x.com", cat: "connect", icon: "ti ti-brand-x", iconColor: "connect", timestamp: 1600000000006 }
      ];

      let count = 0;
      initialLinks.forEach((link, idx) => {
        const soul = 'lnk-init-' + idx;
        zen.get('~' + pair.pub).get('portal_links').get(soul).put(link, (ack) => {
          if (!ack.err) {
            count++;
            if (count === initialLinks.length) {
              showToast("Seeded initial default links successfully!");
            }
          }
        }, { authenticator: pair });
      });
    }

    // Collapsible Admin Panel Interaction
    const adminToggle = document.getElementById('admin-toggle');
    const adminBody = document.getElementById('admin-body');
    const adminChevron = document.getElementById('admin-chevron');

    if (adminToggle && adminBody) {
      adminToggle.addEventListener('click', () => {
        adminBody.classList.toggle('hidden');
        if (adminBody.classList.contains('hidden')) {
          adminChevron.style.transform = 'rotate(-90deg)';
        } else {
          adminChevron.style.transform = '';
        }
      });
    }

    // Keyboard navigation and event listeners
    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('pass-input').focus(); });
    document.getElementById('pass-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    document.getElementById('login-btn').addEventListener('click', login);
    document.getElementById('add-link-btn').addEventListener('click', addLink);
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('seed-btn').addEventListener('click', seedDefaults);

    // Auto login if session credentials exist
    const savedUser = sessionStorage.getItem('zen_user');
    const savedPass = sessionStorage.getItem('zen_pass');
    if (savedUser && savedPass) login();
  </script>
</body>

</html>
