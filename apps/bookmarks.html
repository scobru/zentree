<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks | ZenTree</title>
  <meta name="description" content="Bookmarks - Decentralized Bookmark Manager by ZenTree.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Shared Design System Tokens */
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      /* Bookmarks Accent is Orange */
      --accent: #b86200;
      --accent-glow: rgba(184, 98, 0, 0.15);
      --badge-zen: #00b4d8;
    }

    /* Light Theme (matching reference screenshot) */
    [data-theme="light"] {
      --bg-outer: #f5f6f8;
      --bg-card: #ffffff;
      --text-primary: #121212;
      --text-secondary: #5e6670;
      --text-muted: #8c96a3;
      --card-bg: #ffffff;
      --card-bg-hover: #f8f9fa;
      --card-border: rgba(0, 0, 0, 0.08);
      --card-border-hover: rgba(0, 0, 0, 0.16);
      --container-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.02);
      --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.06);
      --badge-bg: #f1f3f5;
      --badge-bg-hover: #e9ecef;
      --avatar-ring: linear-gradient(135deg, #00b4d8, #e01e37);
      --input-bg: #f8f9fa;
    }

    /* Dark Theme */
    [data-theme="dark"] {
      --bg-outer: #090a0c;
      --bg-card: #121316;
      --text-primary: #f5f5f7;
      --text-secondary: #9ba0a5;
      --text-muted: #4a4f54;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-bg-hover: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.06);
      --card-border-hover: rgba(255, 255, 255, 0.12);
      --container-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.2);
      --badge-bg: rgba(255, 255, 255, 0.05);
      --badge-bg-hover: rgba(255, 255, 255, 0.1);
      --avatar-ring: linear-gradient(135deg, #2ec4b6, #ffb703);
      --input-bg: rgba(0, 0, 0, 0.2);

      /* Dark mode accent override */
      --accent: #ffab40;
      --accent-glow: rgba(255, 171, 64, 0.15);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-outer);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── Floating App Canvas ── */
    .lt-card {
      background: var(--bg-card);
      width: 100%;
      max-width: 800px;
      border-radius: 32px;
      box-shadow: var(--container-shadow);
      padding: 2.5rem 2rem;
      position: relative;
      border: 1px solid var(--card-border);
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Top Floating Action Bar ── */
    .lt-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lt-action-btn {
      background: var(--badge-bg);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 18px;
      text-decoration: none;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s ease, color 0.2s ease;
    }

    .lt-action-btn:hover {
      transform: scale(1.08);
      background: var(--badge-bg-hover);
    }

    .lt-action-btn:active {
      transform: scale(0.95);
    }

    /* ── Header ── */
    .lt-header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .lt-avatar-container {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
      padding: 3px;
      background: var(--avatar-ring);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    .lt-avatar-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg-card);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    /* Color scheme based icon fallback background tint */
    .ic-zen {
      background: rgba(255, 183, 3, 0.06) !important;
    }

    .lt-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .lt-bio {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      max-width: 380px;
      margin: 0 auto;
      font-weight: 400;
    }

    .lt-meta-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }

    .lt-badge {
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid var(--card-border);
      border-radius: 50px;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .lt-badge-accent {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    /* ── Sections ── */
    .lt-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lt-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-top: 1rem;
      letter-spacing: 0.08em;
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lt-section-title::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--card-border);
    }

    .lt-card-body {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
    }

    .lt-card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    /* ── Modern Form Control ── */
    .lt-form-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    @media (max-width: 640px) {
      .lt-form-row {
        flex-direction: column;
      }
    }

    .lt-input {
      background-color: var(--input-bg);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      flex: 1;
      width: 100%;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .lt-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .lt-btn {
      background: var(--accent);
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
    }

    .lt-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .lt-btn:active {
      transform: translateY(0);
    }

    /* ── Decrypted Items Loop ── */
    .category-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-divider {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 0.08em;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 15px;
    }

    .section-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 768px) {
      .items-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .items-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Item Card (Rendered Dynamically) ── */
    .item-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        border-color 0.2s ease,
        box-shadow 0.2s ease;
    }

    .item-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: var(--card-shadow-hover);
    }

    .item-card-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-glow);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: transform 0.2s ease;
    }

    .item-card:hover .item-card-icon {
      transform: scale(1.1);
    }

    .item-card h3 {
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .item-card p {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-secondary);
      line-height: 1.4;
      word-break: break-all;
    }

    .trash-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: var(--badge-bg);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, color 0.2s, transform 0.2s;
      z-index: 10;
    }

    .trash-btn:hover {
      background-color: rgba(224, 30, 55, 0.15);
      color: #e01e37;
      transform: scale(1.1);
    }

    .hidden {
      display: none !important;
    }

    /* ── Footer ── */
    .lt-footer {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1rem;
      border-top: 1px dashed var(--card-border);
      padding-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
  </style>
</head>

<body>

  <main class="lt-card">

    <!-- Top Nav Controls -->
    <div class="lt-top-bar">
      <div>
        <a class="lt-action-btn" href="../index.html" aria-label="Go Back" title="Go back to index">
          <i class="ti ti-arrow-left"></i>
        </a>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="lt-action-btn" onclick="toggleTheme()" aria-label="Toggle Theme" title="Toggle Light/Dark Theme">
          <i class="ti ti-asterisk"></i>
        </button>
        <button class="lt-action-btn hidden" id="logout-btn" onclick="logout()" aria-label="Lock Bookmarks"
          title="Lock bookmarks">
          <i class="ti ti-lock"></i>
        </button>
      </div>
    </div>

    <!-- Profile Header -->
    <header class="lt-header">
      <div class="lt-avatar-container">
        <div class="lt-avatar-fallback ic-zen"><i class="ti ti-bookmark"></i></div>
      </div>
      <h1 class="lt-name">Bookmarks</h1>
      <p class="lt-bio">Decentralized Bookmark Manager</p>
      <div class="lt-meta-row">
        <span class="lt-badge">DOC: BOOKMARKS.MD</span>
        <span class="lt-badge lt-badge-accent"><i class="ti ti-shield-check"></i> CRYPTO SECURE</span>
      </div>
    </header>

    <!-- Authentication Section -->
    <section class="lt-section" id="auth-section">
      <h2 class="lt-section-title" id="auth-toggle" style="cursor: pointer; user-select: none;">
        authentication required <i class="ti ti-chevron-down" id="auth-chevron"
          style="transition: transform 0.2s; font-size: 14px; margin-left: 4px; transform: rotate(-90deg);"></i>
      </h2>
      <div class="lt-card-body hidden" id="auth-body">
        <p class="lt-card-desc"><i class="ti ti-key" style="color:var(--accent);"></i> Log in using Master Credentials
          to write, edit, or delete bookmarks.</p>
        <div class="lt-form-row">
          <input type="text" id="user-input" placeholder="Username" class="lt-input">
          <input type="password" id="pass-input" placeholder="Password" class="lt-input">
          <button class="lt-btn" id="login-btn" onclick="login()">Authenticate</button>
        </div>
      </div>
    </section>

    <!-- Dynamic Main App Content -->
    <div id="app-content" style="display: flex; flex-direction: column; gap: 24px;">
      <!-- Secure bookmark creation (Only shown when logged in) -->
      <section class="lt-section hidden" id="add-section">
        <h2 class="lt-section-title">add bookmark</h2>
        <div class="lt-card-body">
          <div style="display: flex; flex-direction: column; gap: 14px;">
            <div class="lt-form-row">
              <input type="text" id="bm-name" placeholder="Site Name" class="lt-input" style="flex: 2;">
              <input type="text" id="bm-cat" placeholder="Category" class="lt-input" style="flex: 1;">
            </div>
            <input type="text" id="bm-url" placeholder="URL (e.g. https://...)" class="lt-input">
            <div style="display: flex; justify-content: flex-end;">
              <button class="lt-btn" id="add-bm-btn" onclick="addBookmark()">Save</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Decrypted Records Area -->
      <div id="bookmarks-container" class="category-wrapper"></div>
    </div>

    <!-- Terminal Status Footer -->
    <footer class="lt-footer">
      <span style="position: relative; display: flex;">
        <span id="status-ping"
          style="width: 8px; height: 8px; border-radius: 50%; display: inline-block; background-color: var(--accent); box-shadow: 0 0 6px var(--accent);"></span>
      </span>
      <span class="font-mono">ZEN_ENTROPY_NETWORK // SCOBRU.DEV</span>
    </footer>

  </main>

  <!-- Storage and Theme configurations scripts -->
  <script>
    let currentTheme = localStorage.getItem('theme') || 'light';

    function applyTheme() {
      if (currentTheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', currentTheme);
      applyTheme();
    }

    document.addEventListener('DOMContentLoaded', applyTheme);
  </script>

  <script type="module">
    import ZEN from 'https://cdn.jsdelivr.net/gh/scobru/zen@main/zen.min.js';

    const PUBLIC_VIEW_KEY = '';

    let zen;
    let pair;
    let isAuthenticated = false;

    const relays = ["wss://delay.scobrudot.dev/zen", "wss://zen.akao.io:8420/zen", "wss://zen0.akao.io:8420/zen", "wss://zen1.akao.io:8420/zen"];
    localStorage.removeItem('zenPeers');

    zen = new ZEN({
      peers: relays,
    });

    if (PUBLIC_VIEW_KEY) {
      loadBookmarks(PUBLIC_VIEW_KEY);
    } else {
      document.getElementById('bookmarks-container').innerHTML = `
        <div class="lt-card-body" style="text-align: center; border: 1px dashed var(--accent); background: none;">
          <p class="lt-card-desc" style="margin-bottom: 0;">Please authenticate to get started and write bookmarks.</p>
        </div>
      `;
    }

    async function login() {
      const userInput = document.getElementById('user-input').value || sessionStorage.getItem('zen_user');
      const passInput = document.getElementById('pass-input').value || sessionStorage.getItem('zen_pass');
      if (!userInput || !passInput) return;

      try {
        const btn = document.getElementById('login-btn');
        btn.innerHTML = 'Authenticating...';

        pair = await ZEN.pair(null, { seed: userInput + passInput });
        isAuthenticated = true;

        sessionStorage.setItem('zen_user', userInput);
        sessionStorage.setItem('zen_pass', passInput);

        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('add-section').classList.remove('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');

        // Update system indicator color to glowing green when auth is active
        const ping = document.getElementById('status-ping');
        ping.style.backgroundColor = '#2ec4b6';
        ping.style.boxShadow = '0 0 6px #2ec4b6';

        loadBookmarks(pair.pub);
      } catch (e) {
        console.error("Auth Error:", e);
        alert("Auth failed: " + e.message);
        document.getElementById('login-btn').innerText = "Authenticate";
      }
    }

    async function addBookmark() {
      if (!isAuthenticated) return;
      const name = document.getElementById('bm-name').value;
      const url = document.getElementById('bm-url').value;
      const cat = document.getElementById('bm-cat').value || 'general';

      if (!name || !url) return;

      const bm = { name, url, cat, timestamp: Date.now() };
      const soul = 'bm-' + Date.now() + '-' + Math.random().toString(36).substring(7);

      zen.get('~' + pair.pub).get('bookmarks').get(soul).put(bm, (ack) => {
        if (ack && ack.err) alert("Save failed: " + ack.err);
      }, { authenticator: pair });

      document.getElementById('bm-name').value = '';
      document.getElementById('bm-url').value = '';
      document.getElementById('bm-cat').value = '';
    }

    function deleteBookmark(soul) {
      if (!isAuthenticated) return;
      if (!confirm("Remove bookmark?")) return;

      zen.get('~' + pair.pub).get('bookmarks').get(soul).put(null, (ack) => {
        if (!ack.err) {
          const el = document.getElementById('bm-' + soul);
          if (el) el.remove();
        }
      }, { authenticator: pair });
    }

    function loadBookmarks(pubKey) {
      if (!pubKey) return;
      const container = document.getElementById('bookmarks-container');
      container.innerHTML = '';
      const categories = {};

      zen.get('~' + pubKey).get('bookmarks').map().on((bm, id) => {
        if (!bm) {
          const el = document.getElementById('bm-' + id);
          if (el) el.remove();
          return;
        }
        if (!bm.name || !bm.url) return;
        const cat = bm.cat || 'general';

        if (!categories[cat]) {
          const wrapper = document.createElement('div');
          wrapper.className = 'category-wrapper';

          const title = document.createElement('div');
          title.className = 'section-divider';
          title.textContent = cat;
          wrapper.appendChild(title);

          const catList = document.createElement('div');
          catList.className = 'items-grid';
          catList.id = `cat-${cat}`;
          wrapper.appendChild(catList);

          container.appendChild(wrapper);
          categories[cat] = catList;
        }

        if (document.getElementById('bm-' + id)) return;

        const card = document.createElement('div');
        card.className = 'item-card';
        card.id = 'bm-' + id;
        card.onclick = () => window.open(bm.url, '_blank');

        let icon = 'ti ti-link';
        if (bm.url.includes('github.com')) icon = 'ti ti-brand-github';
        if (bm.url.includes('twitter.com') || bm.url.includes('x.com')) icon = 'ti ti-brand-x';
        if (bm.url.includes('youtube.com')) icon = 'ti ti-brand-youtube';

        card.innerHTML = `
          <div class="item-card-icon"><i class="${icon}"></i></div>
          <h3>${bm.name}</h3>
          <p class="font-mono">${bm.url}</p>
        `;

        if (isAuthenticated) {
          const delBtn = document.createElement('button');
          delBtn.className = 'trash-btn';
          delBtn.innerHTML = '<i class="ti ti-trash"></i>';
          delBtn.title = 'Delete Bookmark';
          delBtn.onclick = (e) => {
            e.stopPropagation();
            deleteBookmark(id);
          };
          card.appendChild(delBtn);
        }

        categories[cat].appendChild(card);
      });
    }

    function logout() {
      sessionStorage.removeItem('zen_user');
      sessionStorage.removeItem('zen_pass');
      window.location.reload();
    }

    window.login = login;
    window.logout = logout;
    window.addBookmark = addBookmark;

    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('pass-input').focus(); });
    document.getElementById('pass-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    document.getElementById('login-btn').addEventListener('click', login);
    document.getElementById('add-bm-btn').addEventListener('click', addBookmark);

    const savedUser = sessionStorage.getItem('zen_user');
    const savedPass = sessionStorage.getItem('zen_pass');
    if (savedUser && savedPass) login();

    // Collapsible Auth Box Interaction
    const authToggle = document.getElementById('auth-toggle');
    const authBody = document.getElementById('auth-body');
    const authChevron = document.getElementById('auth-chevron');

    if (authToggle && authBody) {
      authToggle.addEventListener('click', () => {
        authBody.classList.toggle('hidden');
        if (authBody.classList.contains('hidden')) {
          authChevron.style.transform = 'rotate(-90deg)';
        } else {
          authChevron.style.transform = '';
        }
      });
    }
  </script>
</body>

</html>
