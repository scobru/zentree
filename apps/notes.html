<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes | Scobru</title>
  <meta name="description" content="Notes - Decentralized Thoughts & Ideas by Scobru.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Shared Design System Tokens */
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      
      /* Notes Accent is Glowing Cyan */
      --accent: #007a8a;
      --accent-glow: rgba(0, 122, 138, 0.15);
      --badge-zen: #00b4d8;
    }

    /* Light Theme (matching reference screenshot) */
    [data-theme="light"] {
      --bg-outer: #f5f6f8;
      --bg-card: #ffffff;
      --text-primary: #121212;
      --text-secondary: #5e6670;
      --text-muted: #8c96a3;
      --card-bg: #ffffff;
      --card-bg-hover: #f8f9fa;
      --card-border: rgba(0, 0, 0, 0.08);
      --card-border-hover: rgba(0, 0, 0, 0.16);
      --container-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.02);
      --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.06);
      --badge-bg: #f1f3f5;
      --badge-bg-hover: #e9ecef;
      --avatar-ring: linear-gradient(135deg, #00b4d8, #e01e37);
      --input-bg: #f8f9fa;
    }

    /* Dark Theme */
    [data-theme="dark"] {
      --bg-outer: #090a0c;
      --bg-card: #121316;
      --text-primary: #f5f5f7;
      --text-secondary: #9ba0a5;
      --text-muted: #4a4f54;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-bg-hover: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.06);
      --card-border-hover: rgba(255, 255, 255, 0.12);
      --container-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --card-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.2);
      --badge-bg: rgba(255, 255, 255, 0.05);
      --badge-bg-hover: rgba(255, 255, 255, 0.1);
      --avatar-ring: linear-gradient(135deg, #2ec4b6, #ffb703);
      --input-bg: rgba(0, 0, 0, 0.2);
      
      /* Dark mode accent override */
      --accent: #00e5ff;
      --accent-glow: rgba(0, 229, 255, 0.15);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-outer);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── Floating App Canvas ── */
    .lt-card {
      background: var(--bg-card);
      width: 100%;
      max-width: 800px;
      border-radius: 32px;
      box-shadow: var(--container-shadow);
      padding: 2.5rem 2rem;
      position: relative;
      border: 1px solid var(--card-border);
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Top Floating Action Bar ── */
    .lt-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lt-action-btn {
      background: var(--badge-bg);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 18px;
      text-decoration: none;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s ease, color 0.2s ease;
    }

    .lt-action-btn:hover {
      transform: scale(1.08);
      background: var(--badge-bg-hover);
    }

    .lt-action-btn:active {
      transform: scale(0.95);
    }

    /* ── Header ── */
    .lt-header {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .lt-avatar-container {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      margin: 0 auto 1.25rem;
      padding: 3px;
      background: var(--avatar-ring);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }

    .lt-avatar-fallback {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg-card);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    /* Color scheme based icon fallback background tint */
    .ic-zen {
      background: rgba(0, 180, 216, 0.06) !important;
    }

    .lt-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .lt-bio {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      max-width: 380px;
      margin: 0 auto;
      font-weight: 400;
    }

    .lt-meta-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }

    .lt-badge {
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid var(--card-border);
      border-radius: 50px;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .lt-badge-accent {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    /* ── Sections ── */
    .lt-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lt-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-top: 1rem;
      letter-spacing: 0.08em;
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lt-section-title::after {
      content: "";
      height: 1px;
      flex: 1;
      background: var(--card-border);
    }

    .lt-card-body {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
    }

    .lt-card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    /* ── Modern Form Control ── */
    .lt-form-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    @media (max-width: 640px) {
      .lt-form-row {
        flex-direction: column;
      }
    }

    .lt-input {
      background-color: var(--input-bg);
      border: 1px solid var(--card-border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 14px;
      flex: 1;
      width: 100%;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea.lt-input {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .lt-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .lt-btn {
      background: var(--accent);
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease;
    }

    .lt-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .lt-btn:active {
      transform: translateY(0);
    }

    /* ── Decrypted Items Loop ── */
    .category-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-divider {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--accent);
      letter-spacing: 0.08em;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 15px;
    }

    .section-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    .items-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 768px) {
      .items-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Note Card (Rendered Dynamically) ── */
    .item-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      position: relative;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  border-color 0.2s ease,
                  box-shadow 0.2s ease;
    }

    .item-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: var(--card-shadow-hover);
    }

    .item-card-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-glow);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .item-card h3 {
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      padding-right: 50px; /* leave space for actions */
    }

    .item-card p.note-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .trash-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: var(--badge-bg);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, color 0.2s, transform 0.2s;
      z-index: 5;
    }

    .trash-btn:hover {
      background-color: rgba(224, 30, 55, 0.15);
      color: #e01e37;
      transform: scale(1.1);
    }

    .share-note-btn {
      position: absolute;
      top: 15px;
      background: var(--badge-bg);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, color 0.2s, transform 0.2s;
      z-index: 5;
    }

    .share-note-btn:hover {
      background-color: var(--accent-glow);
      color: var(--accent);
      transform: scale(1.1);
    }

    .hidden {
      display: none !important;
    }

    /* ── Modal Design ── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: opacity 0.3s ease;
    }

    .modal.is-open {
      display: flex;
    }

    .modal-content {
      background-color: var(--bg-card);
      border: 1px solid var(--card-border);
      max-width: 600px;
      width: 100%;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      position: relative;
    }

    .modal-title {
      font-family: var(--font-sans);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
      border-bottom: 1px dashed var(--card-border);
      padding-bottom: 10px;
    }

    .modal-text {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 20px;
      padding-right: 8px;
    }

    .modal-close {
      text-align: right;
    }

    .bracket-btn {
      background: var(--badge-bg);
      border: none;
      padding: 8px 18px;
      border-radius: 50px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.2s, transform 0.2s;
    }

    .bracket-btn:hover {
      background: var(--badge-bg-hover);
      transform: scale(1.05);
    }

    /* ── Toast Notification ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(18, 19, 22, 0.9);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(8px);
      z-index: 10000;
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    [data-theme="light"] .toast {
      background: rgba(255, 255, 255, 0.95);
      color: #121212;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* ── Footer ── */
    .lt-footer {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1rem;
      border-top: 1px dashed var(--card-border);
      padding-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
  </style>
</head>

<body>

  <main class="lt-card">
    
    <!-- Top Nav Controls -->
    <div class="lt-top-bar">
      <div>
        <a class="lt-action-btn" href="../index.html" aria-label="Go Back" title="Go back to index">
          <i class="ti ti-arrow-left"></i>
        </a>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="lt-action-btn" onclick="toggleTheme()" aria-label="Toggle Theme" title="Toggle Light/Dark Theme">
          <i class="ti ti-asterisk"></i>
        </button>
        <button class="lt-action-btn hidden" id="logout-btn" onclick="logout()" aria-label="Lock Notes" title="Lock notes">
          <i class="ti ti-lock"></i>
        </button>
      </div>
    </div>

    <!-- Profile Header -->
    <header class="lt-header">
      <div class="lt-avatar-container">
        <div class="lt-avatar-fallback ic-zen"><i class="ti ti-notes"></i></div>
      </div>
      <h1 class="lt-name">Notes</h1>
      <p class="lt-bio">Decentralized Thoughts &amp; Ideas</p>
      <div class="lt-meta-row">
        <span class="lt-badge">DOC: NOTES.MD</span>
        <span class="lt-badge lt-badge-accent"><i class="ti ti-shield-check"></i> CRYPTO SECURE</span>
      </div>
    </header>

    <!-- Authentication Section -->
    <section class="lt-section" id="auth-section">
      <h2 class="lt-section-title" id="auth-toggle" style="cursor: pointer; user-select: none;">
        authentication required <i class="ti ti-chevron-down" id="auth-chevron" style="transition: transform 0.2s; font-size: 14px; margin-left: 4px; transform: rotate(-90deg);"></i>
      </h2>
      <div class="lt-card-body hidden" id="auth-body">
        <p class="lt-card-desc"><i class="ti ti-key" style="color:var(--accent);"></i> Log in using Master Credentials to write, edit, or delete notes.</p>
        <div class="lt-form-row">
          <input type="text" id="user-input" placeholder="Username" class="lt-input">
          <input type="password" id="pass-input" placeholder="Password" class="lt-input">
          <button class="lt-btn" id="login-btn" onclick="login()">Authenticate</button>
        </div>
      </div>
    </section>

    <!-- Dynamic Main App Content -->
    <div id="app-content" style="display: flex; flex-direction: column; gap: 24px;">
      <!-- Secure storage creation (Only shown when logged in) -->
      <section class="lt-section hidden" id="add-section">
        <h2 class="lt-section-title">new thought</h2>
        <div class="lt-card-body">
          <div style="display: flex; flex-direction: column; gap: 14px;">
            <div class="lt-form-row">
              <input type="text" id="note-title" placeholder="Subject line" class="lt-input" style="flex: 2;">
              <input type="text" id="note-cat" placeholder="Category" class="lt-input" style="flex: 1;">
            </div>
            <textarea id="note-body" placeholder="Deep thoughts..." class="lt-input" style="min-height: 100px; resize: vertical;"></textarea>
            <div style="display: flex; justify-content: flex-end;">
              <button class="lt-btn" id="add-note-btn" onclick="addNote()">Commit</button>
            </div>
          </div>
        </div>
      </section>

      <!-- Decrypted Records Area -->
      <div id="notes-container" class="category-wrapper"></div>
    </div>

    <!-- Terminal Status Footer -->
    <footer class="lt-footer">
      <span style="position: relative; display: flex;">
        <span id="status-ping" style="width: 8px; height: 8px; border-radius: 50%; display: inline-block; background-color: var(--accent); box-shadow: 0 0 6px var(--accent);"></span>
      </span>
      <span class="font-mono">ZEN_ENTROPY_NETWORK // ZENTREE</span>
    </footer>

  </main>

  <!-- Storage and Theme configurations scripts -->
  <script>
    let currentTheme = localStorage.getItem('theme') || 'light';
    
    function applyTheme() {
      if (currentTheme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', currentTheme);
      applyTheme();
    }

    document.addEventListener('DOMContentLoaded', applyTheme);
  </script>

  <script type="module">
    import ZEN from 'https://unpkg.com/@akaoio/zen@1.0.25/zen.min.js';

    const PUBLIC_VIEW_KEY = '';

    let zen;
    let pair;
    let isAuthenticated = false;
    let lastZoomedNoteUrl = '';

    const relays = ["wss://zen.akao.io:8420/zen", "wss://zen0.akao.io:8420/zen", "wss://zen1.akao.io:8420/zen"];
    localStorage.removeItem('zenPeers');
    
    zen = new ZEN({
      peers: relays,
    });
    
    // Parse URL params for shared notes loading
    const urlParams = new URLSearchParams(window.location.search);
    const sharedPub = urlParams.get('pub');
    const sharedNoteId = urlParams.get('note');
    
    if (sharedPub) {
      loadNotes(sharedPub);
    } else if (PUBLIC_VIEW_KEY) {
      loadNotes(PUBLIC_VIEW_KEY);
    } else {
      document.getElementById('notes-container').innerHTML = `
        <div class="lt-card-body" style="text-align: center; border: 1px dashed var(--accent); background: none;">
          <p class="lt-card-desc" style="margin-bottom: 0;">Please authenticate to get started and write notes.</p>
        </div>
      `;
    }

    async function login() {
      const userInput = document.getElementById('user-input').value || sessionStorage.getItem('zen_user');
      const passInput = document.getElementById('pass-input').value || sessionStorage.getItem('zen_pass');
      if (!userInput || !passInput) return;

      try {
        const btn = document.getElementById('login-btn');
        btn.innerHTML = 'Authenticating...';

        pair = await ZEN.pair(null, { seed: userInput + passInput });
        isAuthenticated = true;

        sessionStorage.setItem('zen_user', userInput);
        sessionStorage.setItem('zen_pass', passInput);

        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('add-section').classList.remove('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');

        // Update system indicator color to glowing green when auth is active
        const ping = document.getElementById('status-ping');
        ping.style.backgroundColor = '#2ec4b6';
        ping.style.boxShadow = '0 0 6px #2ec4b6';

        loadNotes(pair.pub);
      } catch (e) {
        console.error("Auth Error:", e);
        alert("Auth failed: " + e.message);
        document.getElementById('login-btn').innerText = "Authenticate";
      }
    }

    async function addNote() {
      if (!isAuthenticated) return;
      const title = document.getElementById('note-title').value;
      const body = document.getElementById('note-body').value;
      const cat = document.getElementById('note-cat').value || 'thoughts';

      if (!title || !body) return;

      const note = { title, body, cat, timestamp: Date.now() };
      const soul = 'note-' + Date.now() + '-' + Math.random().toString(36).substring(7);

      zen.get('~' + pair.pub).get('notes').get(soul).put(note, (ack) => {
        if (ack && ack.err) alert("Commit failed: " + ack.err);
      }, { authenticator: pair });

      document.getElementById('note-title').value = '';
      document.getElementById('note-body').value = '';
      document.getElementById('note-cat').value = '';
    }

    function deleteNote(soul) {
      if (!isAuthenticated) return;
      if (!confirm("Discard this thought?")) return;

      zen.get('~' + pair.pub).get('notes').get(soul).put(null, (ack) => {
        if (!ack.err) {
          const el = document.getElementById('note-' + soul);
          if (el) el.remove();
        }
      }, { authenticator: pair });
    }

    function loadNotes(pubKey) {
      if (!pubKey) return;
      const container = document.getElementById('notes-container');
      container.innerHTML = '';
      const categories = {};

      zen.get('~' + pubKey).get('notes').map().on((note, id) => {
        if (!note) {
          const el = document.getElementById('note-' + id);
          if (el) el.remove();
          return;
        }
        if (!note.title || !note.body) return;
        const cat = note.cat || 'thoughts';

        if (!categories[cat]) {
          const wrapper = document.createElement('div');
          wrapper.className = 'category-wrapper';

          const title = document.createElement('div');
          title.className = 'section-divider';
          title.textContent = cat;
          wrapper.appendChild(title);

          const catList = document.createElement('div');
          catList.className = 'items-grid';
          catList.id = `cat-${cat}`;
          wrapper.appendChild(catList);

          container.appendChild(wrapper);
          categories[cat] = catList;
        }

        if (document.getElementById('note-' + id)) {
          const existingContent = document.querySelector(`#note-${id} .note-text`);
          if (existingContent) existingContent.innerText = note.body;
          return;
        }

        const timestamp = note.timestamp || Date.now();
        const dateStr = new Date(timestamp).toLocaleDateString(navigator.language || 'it-IT', {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        const card = document.createElement('div');
        card.className = 'item-card';
        card.id = 'note-' + id;
        card.setAttribute('data-timestamp', timestamp);
        card.onclick = () => openZoomModal(note.title, note.body, dateStr, pubKey, id);

        card.innerHTML = `
          <div class="item-card-icon"><i class="ti ti-notes"></i></div>
          <div style="font-size: 10px; color: var(--text-muted); margin-bottom: 4px; font-family: var(--font-mono);">${dateStr}</div>
          <h3>${note.title}</h3>
          <p class="note-text" style="white-space: pre-wrap; font-family: var(--font-mono); word-break: break-word;">${note.body}</p>
        `;

        // Share note button (for public notes)
        const shareBtn = document.createElement('button');
        shareBtn.className = 'share-note-btn';
        shareBtn.innerHTML = '<i class="ti ti-share"></i>';
        shareBtn.title = 'Share Note Link';
        if (isAuthenticated) {
          shareBtn.style.right = '50px';
        } else {
          shareBtn.style.right = '15px';
        }
        shareBtn.onclick = (e) => {
          e.stopPropagation();
          const shareUrl = `${window.location.origin}${window.location.pathname}?pub=${pubKey}&note=${id}`;
          navigator.clipboard.writeText(shareUrl).then(() => {
            showToast('Note link copied to clipboard!');
          }).catch(() => {
            // fallback
            const el = document.createElement('textarea');
            el.value = shareUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('Note link copied to clipboard!');
          });
        };
        card.appendChild(shareBtn);

        if (isAuthenticated) {
          const delBtn = document.createElement('button');
          delBtn.className = 'trash-btn';
          delBtn.innerHTML = '<i class="ti ti-trash"></i>';
          delBtn.title = 'Discard Thought';
          delBtn.onclick = (e) => {
            e.stopPropagation();
            deleteNote(id);
          };
          card.appendChild(delBtn);
        }

        // --- SORT SYSTEM: Always most recent note at the top ---
        const catList = categories[cat];
        const children = Array.from(catList.children);
        let inserted = false;
        for (const child of children) {
          const childTs = parseInt(child.getAttribute('data-timestamp') || '0');
          if (timestamp > childTs) {
            catList.insertBefore(card, child);
            inserted = true;
            break;
          }
        }
        if (!inserted) {
          catList.appendChild(card);
        }

        // If this note is shared via URL, open it in zoom modal automatically
        if (sharedNoteId && id === sharedNoteId) {
          setTimeout(() => {
            openZoomModal(note.title, note.body, dateStr, pubKey, id);
          }, 350);
        }
      });
    }

    function logout() {
      sessionStorage.removeItem('zen_user');
      sessionStorage.removeItem('zen_pass');
      window.location.reload();
    }

    window.login = login;
    window.logout = logout;
    window.addNote = addNote;

    document.getElementById('user-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('pass-input').focus(); });
    document.getElementById('pass-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    document.getElementById('login-btn').addEventListener('click', login);
    document.getElementById('add-note-btn').addEventListener('click', addNote);

    function openZoomModal(title, body, dateStr, pubKey, noteId) {
      document.getElementById('zoom-title').textContent = title;
      document.getElementById('zoom-date').textContent = dateStr;
      document.getElementById('zoom-body').innerText = body;
      
      if (pubKey && noteId) {
        lastZoomedNoteUrl = `${window.location.origin}${window.location.pathname}?pub=${pubKey}&note=${noteId}`;
        document.getElementById('modal-share-btn').style.display = 'inline-block';
      } else {
        document.getElementById('modal-share-btn').style.display = 'none';
      }
      
      document.getElementById('zoom-modal').classList.add('is-open');
    }

    function closeZoomModal() {
      document.getElementById('zoom-modal').classList.remove('is-open');
    }

    window.openZoomModal = openZoomModal;
    window.closeZoomModal = closeZoomModal;

    const savedUser = sessionStorage.getItem('zen_user');
    const savedPass = sessionStorage.getItem('zen_pass');
    if (savedUser && savedPass) login();

    // Collapsible Auth Box Interaction
    const authToggle = document.getElementById('auth-toggle');
    const authBody = document.getElementById('auth-body');
    const authChevron = document.getElementById('auth-chevron');

    if (authToggle && authBody) {
      authToggle.addEventListener('click', () => {
        authBody.classList.toggle('hidden');
        if (authBody.classList.contains('hidden')) {
          authChevron.style.transform = 'rotate(-90deg)';
        } else {
          authChevron.style.transform = '';
        }
      });
    }

    // Modal Share Button Click
    document.getElementById('modal-share-btn').addEventListener('click', () => {
      if (lastZoomedNoteUrl) {
        navigator.clipboard.writeText(lastZoomedNoteUrl).then(() => {
          showToast('Note link copied to clipboard!');
        }).catch(() => {
          const el = document.createElement('textarea');
          el.value = lastZoomedNoteUrl;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          showToast('Note link copied to clipboard!');
        });
      }
    });
  </script>

  <!-- Note Zoom Modal Overlay -->
  <div class="modal" id="zoom-modal" onclick="closeZoomModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-title" id="zoom-title">THOUGHT_DETAILS</div>
      <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 15px; font-family: var(--font-mono);" id="zoom-date">--/--/--</div>
      <div class="modal-text" id="zoom-body" style="white-space: pre-wrap; font-family: var(--font-mono); word-break: break-word; font-size: 14px; color: var(--text-secondary); line-height: 1.6; max-height: 400px; overflow-y: auto; margin-bottom: 25px;">
        <!-- Content injected dynamically -->
      </div>
      <div class="modal-close" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <button class="bracket-btn" id="modal-share-btn" style="background: var(--accent); color: #fff; border: none; display: flex; align-items: center; gap: 6px;"><i class="ti ti-share"></i> Share Note</button>
        <button class="bracket-btn" onclick="closeZoomModal()">Close</button>
      </div>
    </div>
  </div>
</body>

</html>
